# fly.toml - glassdoorv3 on Fly.io
#
# RAM Breakdown for SeleniumBase UC/CDP mode:
#   - Chrome browser process (UC mode):    ~500-700MB
#   - Chrome renderer (per tab):           ~300-500MB
#   - V8 JS engine + page DOM:             ~200-400MB
#   - Multithreaded desc fetching (8x):    ~200MB
#   - Python + Flask + requests overhead:  ~150MB
#   - OS + headroom:                       ~250MB
#   ─────────────────────────────────────────────
#   Total safe minimum:                    ~1.6GB
#   Recommended for fast/snappy:           4096MB (4GB)
#     → No swap thrashing during Chrome startup
#     → CDP command buffer stays in RAM
#     → Thread pool doesn't compete for memory
#
# CPU: performance-2x (2 dedicated vCPUs)
#   - Chrome JS rendering is CPU-bound
#   - 8 concurrent description-fetch threads benefit from 2 cores
#   - UC/CDP mode patches Chrome at startup — CPU-intensive
#   - performance-1x would bottleneck during page load + JS eval

app = 'glassdoorv3'
primary_region = 'iad'

[build]

[env]
  PORT = '8080'
  kill_signal = 'SIGINT'
  kill_timeout = '300s'
  # Required for headless Chrome in containers
  DISPLAY = ':99'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 3
    soft_limit = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'performance-2x'
  memory = '4096mb'
